services:
  # NOTE: No `platform:` flags here.
  #
  # RUN ARM64 containers via QEMU on your amd64 host. This works for custom
  # Python images we build (QEMU handles them) but kills pre-built native
  # binaries like ollama/ollama ("exec format error").
  #
  # ARM64 targeting for Pi deploy lives in docker-compose.pi.yml (override).
  # To deploy to Pi: docker compose -f docker-compose.yml -f docker-compose.pi.yml ...

  ollama:
    image: ollama/ollama:latest
    container_name: mara-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    restart: unless-stopped
    healthcheck:
      # ollama/ollama image has no curl/wget — use the ollama binary itself.
      # `ollama list` exits 0 when the server is ready, non-zero otherwise.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  hypervisor:
    # Build context is project root so data/ and config/ are reachable.
    # hypervisor/main.py imports from data.feeds.market_data at runtime —
    # that module lives outside ./hypervisor so ./hypervisor alone is wrong.
    build:
      context: .
      dockerfile: hypervisor/Dockerfile
    container_name: mara-hypervisor
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data/db:/app/data/db
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker-nautilus:
    build: ./workers/nautilus
    container_name: mara-nautilus
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-polymarket:
    build: ./workers/polymarket
    container_name: mara-polymarket
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8002:8002"
    volumes:
      - ./config:/app/config:ro
    env_file: .env
    restart: unless-stopped
    healthcheck:
      # polymarket image has no curl — use python3 (always present in python:3.11-slim)
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-analyst:
    build: ./workers/analyst
    container_name: mara-analyst
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      ANALYST_URL: "http://worker-analyst:8003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-arbitrader:
    build: ./workers/arbitrader
    container_name: mara-arbitrader
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8004:8004"
    volumes:
      - arbitrader_logs:/app/logs
    environment:
      JAVA_OPTS: "-Xmx400m -Xms128m"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-telegram-bot:
    build: ./workers/telegram_bot
    container_name: mara-telegram-bot
    depends_on:
      hypervisor:
        condition: service_healthy
    environment:
      HYPERVISOR_URL: "http://hypervisor:8000"
    env_file: .env
    restart: unless-stopped

  worker-core-dividends:
    build: ./workers/core_dividends
    container_name: mara-core-dividends
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8006:8006"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:latest
    container_name: mara-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      hypervisor:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:latest
    container_name: mara-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-mara_local}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    restart: unless-stopped
    depends_on:
      - prometheus

  worker-stocksharp:
    build: ./workers/stocksharp/src
    container_name: mara-stocksharp
    profiles:
      - paper
      - live
    depends_on:
      hypervisor:
        condition: service_healthy
    ports:
      - "8005:8005"
    env_file: .env
    restart: unless-stopped

volumes:
  ollama_data:
  arbitrader_logs:
  prometheus_data:
  grafana_data:
